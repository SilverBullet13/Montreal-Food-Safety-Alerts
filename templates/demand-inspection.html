{% extends 'base.html' %}

{% block content %}

    <div class="container mt-4 div-border-highlight">
    <h2 class="text-center mb-4">Formulaire de plainte</h2>
    <div class="form-section mb-5">
      <form id="plainte-form">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="etablissement" class="form-label">Nom de l'établissement:</label>
            <input type="text" id="etablissement" name="etablissement" class="form-control" required>
          </div>
          <div class="col-md-6 mb-3">
            <label for="adresse" class="form-label">Adresse:</label>
            <input type="text" id="adresse" name="adresse" class="form-control" required>
          </div>
          <div class="col-md-6 mb-3">
            <label for="ville" class="form-label">Ville:</label>
            <input type="text" id="ville" name="ville" class="form-control" required>
          </div>
          <div class="col-md-6 mb-3">
            <label for="date_visite" class="form-label">Date de votre visite:</label>
            <input type="date" id="date_visite" name="date_visite" class="form-control" required>
          </div>
          <div class="col-md-6 mb-3">
            <label for="nom_client" class="form-label">Votre nom:</label>
            <input type="text" id="nom_client" name="nom_client" class="form-control" required>
          </div>
          <div class="col-md-6 mb-3">
            <label for="prenom_client" class="form-label">Votre prénom:</label>
            <input type="text" id="prenom_client" name="prenom_client" class="form-control" required>
          </div>
          <div class="col-12 mb-3">
            <label for="description" class="form-label">Description du problème observé:</label>
            <textarea id="description" name="description" class="form-control" rows="5" required></textarea>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-primary">Envoyer la plainte</button>
          </div>
        </div>
      </form>
      <p id="confirmation" class="text-success mt-3"></p>
      <p id="erreur" class="text-danger"></p>
    </div>
  </div>
    <script src="static/js/demand_inspection.js"></script>
{% endblock %}
